<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuxAgents · Work 模式 — 高保真原型</title>
<style>
/* ============ 设计 Token（与 renderer/styles/globals.css 对齐） ============ */
:root[data-theme="dark"] {
  --bg: #1A1612;            /* 暖黑 */
  --surface-1: #231E19;     /* 表面层 1：sidebar/card */
  --surface-2: #2D2520;     /* 表面层 2：popover/嵌套卡 */
  --surface-3: #3D332B;     /* 表面层 3：hover */
  --border: #3D332B;
  --fg: #F4F1EC;            /* 奶油白 */
  --fg-muted: #A89880;      /* 暖灰 */
  --accent: #DA7756;        /* 赭石橙 */
  --accent-soft: rgba(218,119,86,.14);
  --shadow-card: 0 1px 3px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.03);
  --shadow-md: 0 6px 16px -4px rgba(0,0,0,.55), 0 2px 4px rgba(0,0,0,.35);
  --shadow-panel: -16px 0 40px -12px rgba(0,0,0,.6);
  /* 状态语义色（暗色调和） */
  --st-writing: #7BA7D9;    /* 撰写·蓝 */
  --st-review: #D9A441;     /* 审核·琥珀 */
  --st-coding: #A78BDA;     /* 编码·紫 */
  --st-writeup: #5FB39B;    /* 回写·青 */
  --st-done: #6FAF7C;       /* 完成·绿 */
  --st-fail: #D96B5B;       /* 失败·红 */
  --st-stale: #C9B458;      /* 超时·黄 */
}
:root[data-theme="light"] {
  --bg: #FFFFFF;
  --surface-1: #FCFCFB;
  --surface-2: #F5F5F4;
  --surface-3: #ECECEA;
  --border: #E5E5E4;
  --fg: #0F0E0C;
  --fg-muted: #77716A;
  --accent: #C15F3C;
  --accent-soft: rgba(193,95,60,.10);
  --shadow-card: 0 1px 3px rgba(20,15,10,.08), 0 1px 2px rgba(20,15,10,.05);
  --shadow-md: 0 6px 16px -6px rgba(20,15,10,.14), 0 2px 4px rgba(20,15,10,.06);
  --shadow-panel: -16px 0 40px -18px rgba(20,15,10,.25);
  --st-writing: #4A7FB5;
  --st-review: #B07F1E;
  --st-coding: #7D5FBF;
  --st-writeup: #2E8F77;
  --st-done: #3F8361;
  --st-fail: #C4503E;
  --st-stale: #A08A2E;
}

* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; }
body {
  font-family: -apple-system, "SF Pro SC", "PingFang SC", "Segoe UI", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--fg);
  font-size: 13px; line-height: 1.5;
  overflow: hidden;
  transition: background .25s, color .25s;
}
.mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
button:focus-visible, [tabindex]:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }

/* ============ 应用骨架：模式栏 | 工作区栏 | 主区 ============ */
.shell { display:flex; height:100vh; }

/* --- 模式切换栏 --- */
.mode-rail {
  width: 56px; flex-shrink:0; background: var(--surface-1);
  display:flex; flex-direction:column; align-items:center; gap:6px; padding:14px 0;
}
.mode-rail .logo { width:30px; height:30px; border-radius:8px; background:var(--accent); display:grid; place-items:center; color:#fff; font-weight:700; font-size:15px; margin-bottom:14px; }
.mode-btn {
  width:40px; height:40px; border-radius:10px; display:grid; place-items:center;
  color:var(--fg-muted); font-size:11px; flex-direction:column; gap:1px;
  transition: background .15s, color .15s;
}
.mode-btn svg { width:17px; height:17px; }
.mode-btn:hover { background: var(--surface-3); }
.mode-btn.active { background: var(--accent-soft); color: var(--accent); }
.mode-rail .spacer { flex:1; }
.theme-toggle { width:40px; height:40px; border-radius:10px; display:grid; place-items:center; color:var(--fg-muted); }
.theme-toggle:hover { background:var(--surface-3); }

/* --- 工作区导航栏 --- */
.ws-nav {
  width: 200px; flex-shrink:0; background: var(--surface-1);
  border-right: 1px solid var(--border);
  padding: 16px 10px; display:flex; flex-direction:column; gap:2px;
}
.ws-nav h2 { font-size:11px; font-weight:600; color:var(--fg-muted); letter-spacing:.08em; padding:0 8px 8px; }
.ws-item {
  display:flex; justify-content:space-between; align-items:center;
  padding: 7px 10px; border-radius:8px; color:var(--fg-muted); width:100%; text-align:left;
}
.ws-item:hover { background: var(--surface-3); }
.ws-item.active { background: var(--surface-2); color: var(--fg); box-shadow: var(--shadow-card); }
.ws-item .cnt { font-size:11px; color:var(--fg-muted); }
.ws-item .dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--st-coding); margin-right:6px; vertical-align:1px; }
.ws-nav .divider { height:1px; background:var(--border); margin:8px 4px; }
.ws-new { color: var(--fg-muted); padding:7px 10px; border-radius:8px; text-align:left; width:100%; }
.ws-new:hover { background:var(--surface-3); color:var(--fg); }

/* --- 主区 --- */
.main { flex:1; display:flex; flex-direction:column; min-width:0; position:relative; }

/* 头部 */
.kb-header {
  display:flex; align-items:center; gap:14px; padding: 14px 20px 10px;
}
.kb-header .title { font-size:16px; font-weight:650; }
.kb-header .stats { display:flex; gap:10px; color:var(--fg-muted); font-size:12px; }
.kb-header .stats b { color: var(--fg); font-weight:600; }
.kb-header .grow { flex:1; }
.hd-btn {
  padding: 6px 12px; border-radius:8px; background: var(--surface-2);
  box-shadow: var(--shadow-card); font-size:12px; color:var(--fg-muted);
  display:flex; align-items:center; gap:6px;
}
.hd-btn:hover { background: var(--surface-3); color: var(--fg); }
.hd-btn.primary { background: var(--accent); color:#fff; font-weight:600; }
.hd-btn.primary:hover { filter: brightness(1.08); }
.tb-status { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--fg-muted); }
.tb-status .led { width:7px; height:7px; border-radius:50%; background: var(--st-done); box-shadow:0 0 6px var(--st-done); }
.kbd-hint { color:var(--fg-muted); font-size:11px; display:flex; gap:8px; }
.kbd-hint kbd { background:var(--surface-2); border-radius:4px; padding:1px 5px; font-family:ui-monospace,monospace; font-size:10px; box-shadow:var(--shadow-card); }

/* ============ 待我处理聚合带 ============ */
.attention {
  margin: 4px 20px 12px; padding: 10px 14px; border-radius: 12px;
  background: var(--surface-1); box-shadow: var(--shadow-md);
  display:flex; align-items:center; gap:12px;
  border-left: 3px solid var(--accent);
}
.attention.hidden { display:none; }
.attention .att-label { font-size:12px; font-weight:650; display:flex; align-items:center; gap:6px; white-space:nowrap; }
.attention .att-label .pulse { width:8px; height:8px; border-radius:50%; background:var(--accent); animation: pulse 1.8s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1; transform:scale(1);} 50%{opacity:.45; transform:scale(.8);} }
.att-chips { display:flex; gap:8px; overflow-x:auto; }
.att-chip {
  display:flex; align-items:center; gap:8px; padding:7px 12px; border-radius:9px;
  background: var(--surface-2); box-shadow: var(--shadow-card); white-space:nowrap; font-size:12px;
}
.att-chip:hover { background: var(--surface-3); }
.att-chip .sev { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.att-chip .id { font-family:ui-monospace,monospace; font-size:11px; color:var(--fg-muted); }
.att-chip .meta { color: var(--fg-muted); font-size:11px; }

/* ============ 看板 ============ */
.board { flex:1; display:flex; gap:14px; padding: 0 20px 20px; overflow-x:auto; min-height:0; }
.col { width: 272px; flex-shrink:0; display:flex; flex-direction:column; min-height:0; }
.col-head { display:flex; align-items:center; gap:8px; padding: 6px 4px 10px; }
.col-head .cdot { width:8px; height:8px; border-radius:50%; }
.col-head .cname { font-size:12.5px; font-weight:650; }
.col-head .ccnt { font-size:11px; color:var(--fg-muted); background:var(--surface-2); border-radius:10px; padding:1px 8px; }
.col-body { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding: 2px 2px 10px; }
.col-body::-webkit-scrollbar { width:0; }

/* 卡片 */
.card {
  background: var(--surface-1); border-radius: 12px; padding: 12px 13px;
  box-shadow: var(--shadow-card); cursor: pointer;
  transition: transform .12s, box-shadow .15s, background .15s;
  position: relative;
}
.card:hover, .card.focused { background: var(--surface-2); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.card.focused { outline: 2px solid var(--accent); outline-offset: 1px; }
.card .row1 { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.card .cbid { font-family:ui-monospace,monospace; font-size:11px; color:var(--fg-muted); }
.card .type { font-size:10px; padding:1px 7px; border-radius:5px; font-weight:600; }
.type.requirement { background:rgba(123,167,217,.16); color:var(--st-writing); }
.type.feature { background:rgba(167,139,218,.16); color:var(--st-coding); }
.type.bug { background:rgba(217,107,91,.16); color:var(--st-fail); }
.type.task { background:rgba(168,152,128,.16); color:var(--fg-muted); }
.card .grow { flex:1; }
.card .prio { font-size:10px; color:var(--fg-muted); font-weight:600; }
.card .ctitle { font-size:13px; font-weight:550; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:8px; }
.card .row3 { display:flex; align-items:center; gap:8px; min-height:20px; }
.card .avatar { width:18px; height:18px; border-radius:50%; background:var(--surface-3); display:grid; place-items:center; font-size:9px; color:var(--fg-muted); flex-shrink:0; }
.card .stage { font-size:11px; padding:1px 8px; border-radius:6px; }
.card .dwell { font-size:10.5px; color:var(--fg-muted); margin-left:auto; }
.card .retry-tag { font-size:10px; color:var(--st-fail); font-weight:600; }

/* 签名元素①：实时活动波形 */
.wave { display:flex; align-items:flex-end; gap:2px; height:14px; margin-left:auto; }
.wave i { width:3px; border-radius:1.5px; background: var(--st-coding); animation: wv 1.1s ease-in-out infinite; }
.wave i:nth-child(1){ height:35%; animation-delay:0s; }
.wave i:nth-child(2){ height:75%; animation-delay:.15s; }
.wave i:nth-child(3){ height:50%; animation-delay:.3s; }
.wave i:nth-child(4){ height:90%; animation-delay:.45s; }
.wave i:nth-child(5){ height:60%; animation-delay:.6s; }
@keyframes wv { 0%,100%{ transform:scaleY(.55);} 50%{ transform:scaleY(1);} }
.card .action-line { font-size:10.5px; color:var(--st-coding); margin-top:7px; display:flex; align-items:center; gap:6px; }
.card .action-line::before { content:''; width:5px; height:5px; border-radius:50%; background:var(--st-coding); animation:pulse 1.4s ease infinite; }

/* ============ 详情面板（380px overlay） ============ */
.panel-mask { position:absolute; inset:0; background:rgba(0,0,0,.25); opacity:0; pointer-events:none; transition:opacity .2s; z-index:20; }
.panel-mask.open { opacity:1; pointer-events:auto; }
.panel {
  position:absolute; top:0; right:-400px; width:380px; height:100%;
  background: var(--surface-1); box-shadow: var(--shadow-panel);
  transition: right .24s cubic-bezier(.32,.72,.35,1); z-index:21;
  display:flex; flex-direction:column;
}
.panel.open { right:0; }
.panel-head { padding:16px 18px 0; }
.panel-head .r1 { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.panel-close { margin-left:auto; width:26px; height:26px; border-radius:7px; display:grid; place-items:center; color:var(--fg-muted); }
.panel-close:hover { background:var(--surface-3); }
.panel-title { font-size:15px; font-weight:650; line-height:1.35; margin-bottom:4px; }
.panel-ext { font-size:11.5px; color:var(--fg-muted); margin-bottom:12px; }
.panel-ext a { color: var(--accent); text-decoration:none; }
.panel-body { flex:1; overflow-y:auto; padding: 0 18px 18px; }

/* 签名元素②：九阶段 stepper + 回退弧线 */
.stepper { position:relative; margin: 6px 0 16px; padding-top: 12px; }
.stepper .track { display:flex; align-items:center; }
.step { display:flex; flex-direction:column; align-items:center; flex:1; position:relative; }
.step .nd { width:10px; height:10px; border-radius:50%; background:var(--surface-3); border:2px solid var(--surface-3); z-index:2; }
.step.done .nd { background: var(--st-done); border-color: var(--st-done); }
.step.cur .nd { background: var(--accent); border-color: var(--accent); animation: pulse 1.6s ease infinite; }
.step .lb { font-size:9.5px; color:var(--fg-muted); margin-top:5px; white-space:nowrap; transform:scale(.92); }
.step.cur .lb { color: var(--accent); font-weight:650; }
.step.done .lb { color: var(--fg-muted); }
.step::before { content:''; position:absolute; top:4px; left:-50%; width:100%; height:2px; background:var(--surface-3); z-index:1; }
.step:first-child::before { display:none; }
.step.done::before, .step.cur::before { background: var(--st-done); }
.step.cur::before { background: linear-gradient(90deg, var(--st-done), var(--accent)); }
.retry-arc { position:absolute; top:-11px; font-size:9.5px; color:var(--st-fail); font-weight:650; white-space:nowrap; }
.retry-arc svg { display:block; margin:0 auto; }

/* 审批横幅 */
.approval-banner {
  background: var(--accent-soft); border-radius: 11px; padding: 12px 14px;
  margin-bottom: 14px; border-left: 3px solid var(--accent);
}
.approval-banner .ab-t { font-size:12.5px; font-weight:650; margin-bottom:3px; display:flex; align-items:center; gap:7px; }
.approval-banner .ab-m { font-size:11.5px; color:var(--fg-muted); margin-bottom:10px; }
.approval-banner .ab-actions { display:flex; gap:8px; }
.ab-btn { padding:6px 13px; border-radius:8px; font-size:12px; font-weight:600; }
.ab-btn.ok { background: var(--accent); color:#fff; }
.ab-btn.ok:hover { filter:brightness(1.08); }
.ab-btn.no { background: var(--surface-2); color:var(--fg-muted); box-shadow: var(--shadow-card); }
.ab-btn.no:hover { background:var(--surface-3); color:var(--fg); }
.reject-box { margin-top:10px; display:none; }
.reject-box.show { display:block; }
.reject-box textarea {
  width:100%; background: var(--bg); border:1px solid var(--border); color:var(--fg);
  border-radius:8px; padding:8px 10px; font:inherit; font-size:12px; resize:vertical; min-height:52px;
}
.reject-box .rb-a { display:flex; justify-content:flex-end; gap:8px; margin-top:8px; }

/* 状态流转 */
.flow-zone { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.flow-btn { padding:7px 14px; border-radius:9px; font-size:12px; font-weight:600; background:var(--surface-2); box-shadow:var(--shadow-card); }
.flow-btn:hover { background:var(--surface-3); }
.flow-btn.fwd { background: var(--accent); color:#fff; }
.flow-btn.fwd:hover { filter:brightness(1.08); }

/* 分区 */
.sect { margin-bottom:16px; }
.sect h3 { font-size:11px; font-weight:650; color:var(--fg-muted); letter-spacing:.08em; margin-bottom:8px; }

/* Tabs */
.tabs { display:flex; gap:2px; background:var(--surface-2); border-radius:9px; padding:3px; margin-bottom:12px; }
.tab { flex:1; text-align:center; padding:5px 0; border-radius:7px; font-size:11.5px; color:var(--fg-muted); }
.tab.active { background:var(--surface-1); color:var(--fg); font-weight:600; box-shadow:var(--shadow-card); }

/* 产出物 */
.artifact { display:flex; align-items:center; gap:9px; padding:8px 10px; border-radius:9px; background:var(--surface-2); box-shadow:var(--shadow-card); margin-bottom:7px; font-size:12px; }
.artifact .st-ic { width:16px; text-align:center; }
.artifact .nm { font-family:ui-monospace,monospace; font-size:11.5px; }
.artifact .tag { margin-left:auto; font-size:10.5px; color:var(--fg-muted); }
.artifact .lk { color:var(--accent); font-size:11px; }

/* Agent 执行日志 */
.agent-log {
  background: var(--bg); border-radius:10px; padding:10px 12px;
  font-family: ui-monospace, "SF Mono", monospace; font-size:11px; line-height:1.7;
  max-height:190px; overflow-y:auto; color:var(--fg-muted);
}
.agent-log .ln { display:flex; gap:8px; opacity:0; animation:fadeln .3s forwards; }
@keyframes fadeln { to { opacity:1; } }
.agent-log .tool { color: var(--st-coding); }
.agent-log .ok { color: var(--st-done); }
.agent-log .txt { color: var(--fg); }

/* 遥测 */
.tele-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; font-size:11.5px; }
.tele-row .tl { width:70px; color:var(--fg-muted); flex-shrink:0; }
.tele-bar { flex:1; height:8px; border-radius:4px; background:var(--surface-2); overflow:hidden; }
.tele-bar i { display:block; height:100%; border-radius:4px; }
.tele-row .tv { width:52px; text-align:right; font-family:ui-monospace,monospace; font-size:10.5px; color:var(--fg-muted); }
.tele-kv { display:flex; gap:14px; flex-wrap:wrap; margin-top:10px; }
.tele-kv .kv { background:var(--surface-2); border-radius:9px; padding:8px 12px; box-shadow:var(--shadow-card); }
.tele-kv .kv b { display:block; font-size:15px; font-weight:650; }
.tele-kv .kv span { font-size:10.5px; color:var(--fg-muted); }

/* 描述 */
.desc { font-size:12.5px; color:var(--fg-muted); line-height:1.7; }
.desc code { background:var(--surface-2); padding:1px 5px; border-radius:4px; font-size:11px; }

/* ============ 命令面板 ============ */
.cmdk-mask { position:fixed; inset:0; background:rgba(0,0,0,.35); display:none; place-items:start center; padding-top:14vh; z-index:50; }
.cmdk-mask.open { display:grid; }
.cmdk { width:460px; background:var(--surface-1); border-radius:14px; box-shadow: 0 24px 64px rgba(0,0,0,.5); overflow:hidden; }
.cmdk input { width:100%; background:transparent; border:none; border-bottom:1px solid var(--border); color:var(--fg); padding:14px 16px; font:inherit; font-size:14px; outline:none; }
.cmdk .list { max-height:280px; overflow-y:auto; padding:6px; }
.cmdk .item { padding:9px 12px; border-radius:8px; display:flex; gap:10px; align-items:center; font-size:12.5px; cursor:pointer; }
.cmdk .item:hover, .cmdk .item.sel { background:var(--surface-3); }
.cmdk .item .ic { color:var(--fg-muted); width:16px; }
.cmdk .item kbd { margin-left:auto; font-size:10px; background:var(--surface-2); border-radius:4px; padding:1px 6px; color:var(--fg-muted); }

/* ============ 空状态 ============ */
.empty-state { position:absolute; inset:0; background:var(--bg); z-index:30; display:none; place-items:center; }
.empty-state.open { display:grid; }
.es-card { width:420px; text-align:center; }
.es-card h2 { font-size:19px; font-weight:650; margin-bottom:8px; }
.es-card p { color:var(--fg-muted); margin-bottom:24px; }
.es-steps { display:flex; flex-direction:column; gap:10px; text-align:left; margin-bottom:24px; }
.es-step { display:flex; gap:12px; align-items:center; background:var(--surface-1); border-radius:12px; padding:13px 16px; box-shadow:var(--shadow-card); }
.es-step .n { width:26px; height:26px; border-radius:50%; background:var(--accent-soft); color:var(--accent); display:grid; place-items:center; font-weight:700; font-size:12px; flex-shrink:0; }
.es-step b { display:block; font-size:13px; }
.es-step span { font-size:11.5px; color:var(--fg-muted); }
.es-close { color:var(--fg-muted); font-size:12px; }
.es-close:hover { color:var(--fg); }

/* ============ 归档视图 ============ */
.archive { position:absolute; inset:0; top:auto; background:var(--bg); z-index:15; display:none; flex-direction:column; height:100%; }
.archive.open { display:flex; }
.archive .arc-head { display:flex; align-items:center; gap:12px; padding:16px 20px; }
.archive .arc-head h2 { font-size:15px; font-weight:650; }
.arc-list { flex:1; overflow-y:auto; padding:0 20px 20px; }
.arc-row { display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:10px; background:var(--surface-1); box-shadow:var(--shadow-card); margin-bottom:8px; font-size:12.5px; }
.arc-row .aid { font-family:ui-monospace,monospace; font-size:11px; color:var(--fg-muted); width:56px; }
.arc-row .fin { margin-left:auto; font-size:11px; color:var(--fg-muted); }
.arc-badge { font-size:10.5px; padding:1px 8px; border-radius:6px; }

/* Toast */
.toast-wrap { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); z-index:60; display:flex; flex-direction:column; gap:8px; align-items:center; }
.toast { background:var(--surface-2); color:var(--fg); border-radius:10px; padding:9px 16px; font-size:12.5px; box-shadow:var(--shadow-md); animation: toastin .25s ease; }
@keyframes toastin { from { opacity:0; transform:translateY(8px);} to { opacity:1; transform:none;} }

/* 演示条 */
.demo-bar { position:fixed; bottom:18px; right:18px; z-index:40; display:flex; gap:8px; }
.demo-btn { background:var(--accent); color:#fff; font-weight:650; font-size:12.5px; padding:9px 16px; border-radius:11px; box-shadow:var(--shadow-md); }
.demo-btn:hover { filter:brightness(1.08); }
.demo-btn.ghost { background:var(--surface-2); color:var(--fg-muted); }
.demo-btn.ghost:hover { color:var(--fg); }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration:.01ms !important; }
}
</style>
</head>
<body>
<div class="shell">

  <!-- 模式切换栏 -->
  <nav class="mode-rail">
    <div class="logo">L</div>
    <button class="mode-btn" title="Chat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
    <button class="mode-btn" title="Code"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></button>
    <button class="mode-btn active" title="Work"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg></button>
    <div class="spacer"></div>
    <button class="theme-toggle" id="themeToggle" title="切换主题"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4m11.4-11.4 1.4-1.4"/></svg></button>
  </nav>

  <!-- 工作区栏 -->
  <nav class="ws-nav">
    <h2>工作区</h2>
    <button class="ws-item active" data-ws="all">全部任务 <span class="cnt" id="cntAll">7</span></button>
    <div class="divider"></div>
    <button class="ws-item" data-ws="camera"><span><span class="dot"></span>Camera ISP</span> <span class="cnt">4</span></button>
    <button class="ws-item" data-ws="audio"><span>Audio DSP</span> <span class="cnt">2</span></button>
    <button class="ws-item" data-ws="wifi"><span>WiFi Driver</span> <span class="cnt">1</span></button>
    <div class="divider"></div>
    <button class="ws-new" id="btnNewTask">＋ 新建任务</button>
    <button class="ws-new" id="btnEmptyState">◌ 预览空状态</button>
  </nav>

  <!-- 主区 -->
  <main class="main">
    <header class="kb-header">
      <span class="title" id="wsTitle">全部任务</span>
      <span class="stats">进行中 <b id="stCoding">2</b> · AI 运行中 <b id="stAi">1</b> · 待审批 <b id="stApproval">1</b></span>
      <div class="grow"></div>
      <span class="kbd-hint"><span><kbd>J</kbd><kbd>K</kbd> 移动</span><span><kbd>Enter</kbd> 详情</span><span><kbd>A</kbd> 批准</span><span><kbd>⌘K</kbd> 命令</span></span>
      <span class="tb-status"><span class="led"></span>TW 已连接</span>
      <button class="hd-btn" id="btnArchive">归档</button>
      <button class="hd-btn primary" id="btnPull">↓ 从 TW 领取</button>
    </header>

    <!-- 待我处理 -->
    <section class="attention" id="attention">
      <span class="att-label"><span class="pulse"></span>待我处理 <span id="attCnt">(3)</span></span>
      <div class="att-chips" id="attChips"></div>
    </section>

    <!-- 看板 -->
    <section class="board" id="board"></section>

    <!-- 归档视图 -->
    <section class="archive" id="archive">
      <div class="arc-head">
        <button class="hd-btn" id="btnArcBack">← 返回看板</button>
        <h2>归档 · 已完成与已取消</h2>
      </div>
      <div class="arc-list" id="arcList"></div>
    </section>

    <!-- 详情面板 -->
    <div class="panel-mask" id="panelMask"></div>
    <aside class="panel" id="panel" aria-label="任务详情"></aside>

    <!-- 空状态 -->
    <div class="empty-state" id="emptyState">
      <div class="es-card">
        <h2>欢迎使用 Work 模式</h2>
        <p>把 Teambition 任务接入 AI 研发闭环，三步开始：</p>
        <div class="es-steps">
          <div class="es-step"><span class="n">1</span><div><b>连接 Teambition</b><span>在设置中填入 TW MCP 连接令牌</span></div></div>
          <div class="es-step"><span class="n">2</span><div><b>选择项目</b><span>指定要同步任务的 TW 项目与本地工作区</span></div></div>
          <div class="es-step"><span class="n">3</span><div><b>领取第一个任务</b><span>点击「从 TW 领取」，任务进入看板开始闭环</span></div></div>
        </div>
        <button class="es-close" id="esClose">返回看板 ›</button>
      </div>
    </div>
  </main>
</div>

<!-- 命令面板 -->
<div class="cmdk-mask" id="cmdkMask">
  <div class="cmdk">
    <input id="cmdkInput" placeholder="搜索任务、执行命令…" autocomplete="off">
    <div class="list" id="cmdkList"></div>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>

<div class="demo-bar">
  <button class="demo-btn ghost" id="btnReset">重置</button>
  <button class="demo-btn" id="btnDemo">▶ 演示闭环</button>
</div>

<script>
/* ================= 数据与状态机 ================= */
const PHASES = ['pending','req-writing','req-reviewing','design-writing','design-reviewing','coding','gerrit-reviewing','pending-writeup','completed'];
const PHASE_LABEL = {
  'pending':'待处理','req-writing':'需求撰写中','req-reviewing':'需求审核中',
  'design-writing':'方案撰写中','design-reviewing':'方案审核中','coding':'编码中',
  'gerrit-reviewing':'Gerrit CR','pending-writeup':'待回写','completed':'已完成','cancelled':'已取消'
};
const STEP_SHORT = ['待处理','需求','需审','方案','方审','编码','CR','回写','完成'];
const PHASE_COLOR = {
  'pending':'var(--fg-muted)','req-writing':'var(--st-writing)','req-reviewing':'var(--st-review)',
  'design-writing':'var(--st-writing)','design-reviewing':'var(--st-review)','coding':'var(--st-coding)',
  'gerrit-reviewing':'var(--st-review)','pending-writeup':'var(--st-writeup)','completed':'var(--st-done)'
};
const COLS = [
  { key:'todo', name:'待办', color:'var(--fg-muted)', phases:['pending','req-writing','req-reviewing','design-writing','design-reviewing'] },
  { key:'coding', name:'编码中', color:'var(--st-coding)', phases:['coding'] },
  { key:'writeback', name:'待回写', color:'var(--st-writeup)', phases:['gerrit-reviewing','pending-writeup'] },
];
const TYPE_LABEL = { requirement:'需求', feature:'Feature', bug:'Bug', task:'Task' };

const seed = () => ([
  { id:'t1', cb:'CB-024', tw:'TW-1024', title:'相机启动耗时优化：冷启动 30 帧内出画', type:'requirement', prio:'P1', ws:'camera',
    phase:'design-reviewing', assignee:'李', dwell:'2h', origin:'tw', retries:0, aiActive:false,
    approval:{ kind:'方案设计文档', waiting:'2h' }, desc:'冷启动场景下从 openCamera 到首帧预览耗时超过竞品 180ms。需给出分阶段优化方案：sensor 上电时序、tuning 参数延迟加载、buffer 预分配。验收标准：冷启动 30 帧内出画，P95 ≤ 850ms。',
    artifacts:[ {n:'requirements.md', done:true, tb:true}, {n:'design.md', done:true, tb:false}, {n:'experience.md', done:false} ] },
  { id:'t2', cb:'CB-025', tw:'TW-1011', title:'HAL3 预览流 buffer 泄漏修复', type:'bug', prio:'P1', ws:'camera',
    phase:'coding', assignee:'王', dwell:'12m', origin:'tw', retries:0, aiActive:true, action:'正在运行单元测试…',
    desc:'长时间预览后 dmabuf fd 持续增长，4 小时后触发 OOM。初步定位 stream teardown 时 ImageReader 未 close。',
    artifacts:[ {n:'design.md', done:true, tb:true}, {n:'experience.md', done:false} ] },
  { id:'t3', cb:'CB-021', tw:'TW-0987', title:'对焦马达驱动 I2C 超时导致 AF 失败', type:'bug', prio:'P2', ws:'camera',
    phase:'coding', assignee:'王', dwell:'1d', origin:'tw', retries:2, aiActive:false, failed:true,
    desc:'压力测试中 VCM 驱动 I2C write 偶现 timeout，AF 收敛失败率 0.3%。重试 2 次未过回归，问题清单：时钟拉伸未处理、重试间隔过短。',
    artifacts:[ {n:'design.md', done:true, tb:true} ] },
  { id:'t4', cb:'CB-026', tw:'TW-1029', title:'AEC 收敛速度优化：逆光场景 3 帧内收敛', type:'feature', prio:'P2', ws:'camera',
    phase:'req-writing', assignee:'李', dwell:'45m', origin:'tw', retries:0, aiActive:true, action:'正在生成需求文档…',
    desc:'逆光场景 AEC 收敛需 8-10 帧，用户可感知亮度跳变。目标 3 帧内收敛且无振荡。',
    artifacts:[ {n:'requirements.md', done:false} ] },
  { id:'t5', cb:'CB-019', tw:'TW-0955', title:'音频延迟测量工具链搭建', type:'task', prio:'P3', ws:'audio',
    phase:'design-writing', assignee:'张', dwell:'1d 4h', origin:'tw', retries:0, aiActive:false, stale:true,
    desc:'搭建 round-trip latency 自动化测量工具，输出各链路分段耗时。',
    artifacts:[ {n:'requirements.md', done:true, tb:true}, {n:'design.md', done:false} ] },
  { id:'t6', cb:'CB-027', tw:null, title:'DSP 固件日志格式统一（本地任务）', type:'task', prio:'P4', ws:'audio',
    phase:'pending', assignee:'张', dwell:'10m', origin:'local', retries:0, aiActive:false,
    desc:'本地创建的个人任务：统一 DSP 固件日志时间戳与模块前缀格式。不参与 KPI 统计。',
    artifacts:[] },
  { id:'t7', cb:'CB-023', tw:'TW-1002', title:'WiFi 驱动周期性扫描功耗回退', type:'bug', prio:'P2', ws:'wifi',
    phase:'pending-writeup', assignee:'刘', dwell:'3h', origin:'tw', retries:1, aiActive:false,
    desc:'扫描间隔配置回退导致待机功耗 +8mA，已修复合入，待撰写经验文档回写 TW。',
    artifacts:[ {n:'design.md', done:true, tb:true}, {n:'experience.md', done:false} ] },
  { id:'a1', cb:'CB-018', tw:'TW-0940', title:'ISP 3A 统计数据格式升级', type:'feature', prio:'P2', ws:'camera', phase:'completed', assignee:'李', fin:'6-30', origin:'tw', artifacts:[] },
  { id:'a2', cb:'CB-015', tw:'TW-0921', title:'Sensor OTP 读取重构', type:'task', prio:'P3', ws:'camera', phase:'completed', assignee:'王', fin:'6-27', origin:'tw', artifacts:[] },
  { id:'a3', cb:'CB-016', tw:null, title:'调试脚本迁移（已取消）', type:'task', prio:'P4', ws:'audio', phase:'cancelled', assignee:'张', fin:'6-28', origin:'local', artifacts:[] },
]);

let tasks = seed();
let curWs = 'all', openId = null, focusIdx = 0, demoTimer = null;

/* ================= 渲染 ================= */
const $ = s => document.querySelector(s);
const visible = () => tasks.filter(t => !['completed','cancelled'].includes(t.phase) && (curWs==='all' || t.ws===curWs));

function attention() {
  const items = [];
  for (const t of visible()) {
    if (t.approval) items.push({ t, sev:'var(--st-fail)', label:`审批请求 · ${t.approval.kind}`, meta:`等待 ${t.approval.waiting}` });
    else if (t.failed) items.push({ t, sev:'var(--st-fail)', label:'任务失败', meta:`重试 ${t.retries}/3 未过` });
    else if (t.stale) items.push({ t, sev:'var(--st-stale)', label:'停留超时', meta:`${PHASE_LABEL[t.phase]} 停留 ${t.dwell}` });
  }
  return items;
}

function renderAttention() {
  const items = attention();
  const el = $('#attention');
  if (!items.length) { el.classList.add('hidden'); return; }
  el.classList.remove('hidden');
  $('#attCnt').textContent = `(${items.length})`;
  $('#attChips').innerHTML = items.map(i => `
    <button class="att-chip" data-open="${i.t.id}">
      <span class="sev" style="background:${i.sev}; box-shadow:0 0 5px ${i.sev}"></span>
      <span class="id">${i.t.cb}</span><span>${i.label}</span><span class="meta">${i.meta}</span>
    </button>`).join('');
}

function cardHtml(t, idx) {
  const stageBadge = COLS[0].phases.includes(t.phase)
    ? `<span class="stage" style="color:${PHASE_COLOR[t.phase]}; background:color-mix(in srgb, ${PHASE_COLOR[t.phase]} 14%, transparent)">${PHASE_LABEL[t.phase]}</span>` : '';
  const wave = t.aiActive ? `<span class="wave"><i></i><i></i><i></i><i></i><i></i></span>` : '';
  const retry = t.failed ? `<span class="retry-tag">↺ ${t.retries}/3</span>` : '';
  const action = t.aiActive && t.action ? `<div class="action-line">${t.action}</div>` : '';
  const localTag = t.origin==='local' ? `<span class="stage" style="color:var(--fg-muted);background:var(--surface-2)">本地</span>` : '';
  return `<article class="card" data-open="${t.id}" data-idx="${idx}" tabindex="0">
    <div class="row1"><span class="cbid">${t.cb}</span><span class="type ${t.type}">${TYPE_LABEL[t.type]}</span>${localTag}<span class="grow"></span><span class="prio">${t.prio}</span></div>
    <div class="ctitle">${t.title}</div>
    <div class="row3"><span class="avatar">${t.assignee}</span>${stageBadge}${retry}${wave}<span class="dwell">${t.dwell}</span></div>
    ${action}
  </article>`;
}

function renderBoard() {
  const vis = visible();
  let idx = 0;
  $('#board').innerHTML = COLS.map(c => {
    const list = vis.filter(t => c.phases.includes(t.phase));
    return `<div class="col">
      <div class="col-head"><span class="cdot" style="background:${c.color}"></span><span class="cname">${c.name}</span><span class="ccnt">${list.length}</span></div>
      <div class="col-body">${list.map(t => cardHtml(t, idx++)).join('') || `<div style="color:var(--fg-muted);font-size:11.5px;padding:12px 6px;">暂无任务</div>`}</div>
    </div>`;
  }).join('');
  $('#stCoding').textContent = vis.filter(t=>t.phase==='coding').length;
  $('#stAi').textContent = vis.filter(t=>t.aiActive).length;
  $('#stApproval').textContent = vis.filter(t=>t.approval).length;
  $('#cntAll').textContent = tasks.filter(t=>!['completed','cancelled'].includes(t.phase)).length;
  document.querySelectorAll('.card').forEach(c => {
    if (+c.dataset.idx === focusIdx) c.classList.add('focused');
  });
}

function stepperHtml(t) {
  const isShort = ['bug','task'].includes(t.type);
  const phases = isShort ? ['pending','coding','gerrit-reviewing','pending-writeup','completed']
                         : PHASES;
  const labels = isShort ? ['待处理','编码','CR','回写','完成'] : STEP_SHORT;
  const ci = phases.indexOf(t.phase);
  const retryArc = t.failed ? `<div class="retry-arc" style="left:${(ci/(phases.length-1))*82+4}%">
      <svg width="46" height="10" viewBox="0 0 46 10"><path d="M44 9 C 34 -3, 12 -3, 2 9" fill="none" stroke="var(--st-fail)" stroke-width="1.5" stroke-dasharray="3 2" marker-end="none"/><polygon points="0,9 6,5 5,10" fill="var(--st-fail)"/></svg>
      重试 ${t.retries}/3</div>` : '';
  return `<div class="stepper">${retryArc}<div class="track">${phases.map((p,i)=>`
    <div class="step ${i<ci?'done':i===ci?'cur':''}"><span class="nd"></span><span class="lb">${labels[i]}</span></div>`).join('')}</div></div>`;
}

const FLOW = {
  'pending':        t => [{lb: ['bug','task'].includes(t.type) ? '开始编码 →' : '开始撰写需求文档 →', fwd:true, to: ['bug','task'].includes(t.type)?'coding':'req-writing'}],
  'req-writing':    () => [{lb:'提交审核 →', fwd:true, to:'req-reviewing'}],
  'req-reviewing':  () => [],
  'design-writing': () => [{lb:'提交审核 →', fwd:true, to:'design-reviewing'}],
  'design-reviewing':() => [],
  'coding':         () => [{lb:'提交 Gerrit →', fwd:true, to:'gerrit-reviewing'}],
  'gerrit-reviewing':() => [{lb:'合入完成，待回写 →', fwd:true, to:'pending-writeup'},{lb:'← 驳回，退回编码', to:'coding'}],
  'pending-writeup':() => [{lb:'标记完成 ✓', fwd:true, to:'completed'}],
};

function agentLogHtml() {
  return `<div class="agent-log" id="agentLog">
    <div class="ln"><span class="tool">⚒ Read</span><span>hal/stream_manager.cpp</span></div>
    <div class="ln" style="animation-delay:.4s"><span class="tool">⚒ Grep</span><span>"ImageReader" — 12 处引用</span></div>
    <div class="ln" style="animation-delay:.8s"><span class="txt">发现 teardown 路径缺少 reader_->close()，补充释放逻辑并加 RAII 守卫。</span></div>
    <div class="ln" style="animation-delay:1.2s"><span class="tool">⚒ Edit</span><span>hal/stream_manager.cpp +18 −4</span></div>
    <div class="ln" style="animation-delay:1.6s"><span class="tool">⚒ Bash</span><span>bun run test:hal --filter buffer</span></div>
    <div class="ln" style="animation-delay:2.2s"><span class="ok">✓ 14 passed</span><span>· fd 计数稳定 4h 压测通过</span></div>
  </div>`;
}

function teleHtml(t) {
  const rows = [
    ['需求撰写', 18, 'var(--st-writing)'], ['需求审核', 9, 'var(--st-review)'],
    ['方案撰写', 26, 'var(--st-writing)'], ['方案审核', 12, 'var(--st-review)'],
    ['编码', t.phase==='coding'?46:70, 'var(--st-coding)'],
  ];
  return `<div class="sect"><h3>各节点耗时</h3>${rows.map(([l,v,c])=>`
    <div class="tele-row"><span class="tl">${l}</span><span class="tele-bar"><i style="width:${v}%;background:${c}"></i></span><span class="tv">${(v*1.6|0)}m</span></div>`).join('')}
    <div class="tele-kv">
      <div class="kv"><b>84.2k</b><span>tokens</span></div>
      <div class="kv"><b>3</b><span>skills 引用</span></div>
      <div class="kv"><b>${t.retries}</b><span>重试次数</span></div>
      <div class="kv"><b>${t.origin==='tw'?'TW':'本地'}</b><span>来源${t.origin==='local'?'（不计 KPI）':''}</span></div>
    </div></div>`;
}

let curTab = 'doc';
function renderPanel() {
  const t = tasks.find(x => x.id === openId);
  const panel = $('#panel');
  if (!t) { panel.classList.remove('open'); $('#panelMask').classList.remove('open'); return; }
  const approvalHtml = t.approval ? `
    <div class="approval-banner">
      <div class="ab-t">📋 ${t.approval.kind}待审批</div>
      <div class="ab-m">已等待 ${t.approval.waiting} · 审批人与耗时将写入遥测</div>
      <div class="ab-actions">
        <button class="ab-btn ok" data-approve="${t.id}">✓ 批准 <kbd style="opacity:.7;font-size:9px">A</kbd></button>
        <button class="ab-btn no" data-reject-toggle>✗ 驳回…</button>
      </div>
      <div class="reject-box" id="rejectBox">
        <textarea id="rejectReason" placeholder="驳回意见（必填，写入遥测与审计日志）"></textarea>
        <div class="rb-a"><button class="ab-btn no" data-reject-cancel>取消</button><button class="ab-btn ok" data-reject-confirm="${t.id}">确认驳回</button></div>
      </div>
    </div>` : '';
  const flows = (FLOW[t.phase]?.(t) ?? []);
  const flowHtml = flows.length ? `<div class="flow-zone">${flows.map(f=>`<button class="flow-btn ${f.fwd?'fwd':''}" data-flow="${t.id}:${f.to}">${f.lb}</button>`).join('')}</div>` : '';
  const artHtml = t.artifacts.length ? t.artifacts.map(a=>`
    <div class="artifact"><span class="st-ic">${a.done?'✅':'○'}</span><span class="nm">${a.n}</span>
      <span class="tag">${a.done ? (a.tb?'已上传 TW':'已生成') : '未生成'}</span>
      ${a.done ? '<span class="lk">查看</span>' : '<span class="lk">前往生成 →</span>'}</div>`).join('') : '<div style="color:var(--fg-muted);font-size:12px">暂无产出物</div>';
  const tabContent = curTab==='doc' ? `<div class="sect"><h3>产出物 · .luxagents-tasks/${t.cb}/</h3>${artHtml}</div>
        <div class="sect"><h3>描述</h3><div class="desc">${t.desc||''}</div></div>`
    : curTab==='log' ? `<div class="sect"><h3>Code 会话实时日志（origin:'work' 会话 · 内嵌 AgentMessages）</h3>${t.phase==='coding'||t.failed ? agentLogHtml() : '<div style="color:var(--fg-muted);font-size:12px">编码节点尚未启动</div>'}</div>`
    : teleHtml(t);
  panel.innerHTML = `
    <div class="panel-head">
      <div class="r1"><span class="cbid mono" style="color:var(--fg-muted);font-size:11px">${t.cb}</span>
        <span class="type ${t.type}">${TYPE_LABEL[t.type]}</span><span class="prio" style="font-size:10px;color:var(--fg-muted)">${t.prio}</span>
        <button class="panel-close" data-close>✕</button></div>
      <div class="panel-title">${t.title}</div>
      <div class="panel-ext">${t.tw ? `<a href="#">#${t.tw} ↗</a> · 来源 Teambition` : '本地任务 · 不参与 KPI 统计'} · 负责人 ${t.assignee}</div>
    </div>
    <div class="panel-body">
      ${stepperHtml(t)}
      ${approvalHtml}
      <div class="sect"><h3>当前阶段：${PHASE_LABEL[t.phase]}${t.failed?' · 上轮回归未过':''}</h3>${flowHtml}</div>
      <div class="tabs">
        <button class="tab ${curTab==='doc'?'active':''}" data-tab="doc">文档与描述</button>
        <button class="tab ${curTab==='log'?'active':''}" data-tab="log">执行日志</button>
        <button class="tab ${curTab==='tele'?'active':''}" data-tab="tele">遥测</button>
      </div>
      ${tabContent}
      <div class="sect"><h3>干预</h3><div class="flow-zone">
        <button class="flow-btn" data-toast="已发送干预指令：重新生成方案">↻ 重新生成方案</button>
        <button class="flow-btn" data-toast="已发送干预指令：跳过冒烟直接回归">⏭ 跳过冒烟</button>
        <button class="flow-btn" data-toast="补充说明已附加到任务上下文">✎ 补充说明…</button>
      </div></div>
    </div>`;
  panel.classList.add('open'); $('#panelMask').classList.add('open');
}

function renderArchive() {
  const arc = tasks.filter(t=>['completed','cancelled'].includes(t.phase));
  $('#arcList').innerHTML = arc.map(t=>`
    <div class="arc-row"><span class="aid">${t.cb}</span><span>${t.title}</span>
      <span class="type ${t.type}">${TYPE_LABEL[t.type]}</span>
      <span class="arc-badge" style="color:${t.phase==='completed'?'var(--st-done)':'var(--fg-muted)'};background:color-mix(in srgb, ${t.phase==='completed'?'var(--st-done)':'var(--fg-muted)'} 14%, transparent)">${PHASE_LABEL[t.phase]}</span>
      <span class="fin">${t.fin||''}</span></div>`).join('');
}

function renderAll(){ renderAttention(); renderBoard(); if(openId) renderPanel(); renderArchive(); }

/* ================= 交互 ================= */
function toast(msg){ const el=document.createElement('div'); el.className='toast'; el.textContent=msg; $('#toasts').appendChild(el); setTimeout(()=>el.remove(), 2600); }

function transition(id, to, note){
  const t = tasks.find(x=>x.id===id); if(!t) return;
  t.phase = to; t.dwell='刚刚';
  t.approval = null; t.failed = false; t.stale = false;
  if (to==='req-writing'||to==='design-writing'){ t.aiActive=true; t.action = to==='req-writing'?'正在生成需求文档…':'正在生成方案设计文档…'; }
  else if (to==='coding'){ t.aiActive=true; t.action='正在分析代码上下文…'; }
  else { t.aiActive=false; t.action=null; }
  if (to==='req-reviewing') t.approval={kind:'需求文档', waiting:'刚刚'};
  if (to==='design-reviewing') t.approval={kind:'方案设计文档', waiting:'刚刚'};
  if (note) toast(note);
  renderAll();
}

document.addEventListener('click', e => {
  const open = e.target.closest('[data-open]'); if (open){ openId=open.dataset.open; curTab='doc'; renderPanel(); return; }
  if (e.target.closest('[data-close]') || e.target.id==='panelMask'){ openId=null; renderPanel(); return; }
  const tab = e.target.closest('[data-tab]'); if (tab){ curTab=tab.dataset.tab; renderPanel(); return; }
  const flow = e.target.closest('[data-flow]'); if (flow){ const [id,to]=flow.dataset.flow.split(':'); transition(id,to,`已迁移至「${PHASE_LABEL[to]}」·（自动化后此按钮由引擎驱动）`); return; }
  const ap = e.target.closest('[data-approve]'); if (ap){ approve(ap.dataset.approve); return; }
  if (e.target.closest('[data-reject-toggle]')){ $('#rejectBox').classList.toggle('show'); return; }
  if (e.target.closest('[data-reject-cancel]')){ $('#rejectBox').classList.remove('show'); return; }
  const rj = e.target.closest('[data-reject-confirm]'); if (rj){
    const reason = $('#rejectReason').value.trim();
    if (!reason){ toast('驳回意见必填'); return; }
    const t = tasks.find(x=>x.id===rj.dataset.rejectConfirm);
    const back = t.phase==='req-reviewing' ? 'req-writing' : 'design-writing';
    transition(t.id, back, `已驳回 ·「${reason.slice(0,18)}${reason.length>18?'…':''}」已写入遥测`);
    return;
  }
  const ts = e.target.closest('[data-toast]'); if (ts){ toast(ts.dataset.toast); return; }
  const ws = e.target.closest('.ws-item'); if (ws){
    document.querySelectorAll('.ws-item').forEach(w=>w.classList.remove('active'));
    ws.classList.add('active'); curWs = ws.dataset.ws;
    $('#wsTitle').textContent = ws.textContent.replace(/\d+$/,'').trim();
    focusIdx = 0; renderAll(); return;
  }
});

function approve(id){
  const t = tasks.find(x=>x.id===id); if(!t||!t.approval) return;
  const next = t.phase==='req-reviewing' ? 'design-writing' : 'coding';
  transition(id, next, `已批准${t.approval.kind === '需求文档' ? '需求文档' : '方案文档'} · 审批人/耗时已写入遥测`);
}

/* 主题 */
$('#themeToggle').onclick = () => {
  const r = document.documentElement;
  r.dataset.theme = r.dataset.theme === 'dark' ? 'light' : 'dark';
};

/* 归档 / 空状态 / 新建 */
$('#btnArchive').onclick = () => { renderArchive(); $('#archive').classList.add('open'); };
$('#btnArcBack').onclick = () => $('#archive').classList.remove('open');
$('#btnEmptyState').onclick = () => $('#emptyState').classList.add('open');
$('#esClose').onclick = () => $('#emptyState').classList.remove('open');
$('#btnNewTask').onclick = () => toast('新建任务 Dialog（本地通道，origin: local）— 见方案文档 §6.7');
$('#btnPull').onclick = () => toast('TW MCP 拉取：list_tasks(projectId) → 落本地状态库');

/* 键盘 */
document.addEventListener('keydown', e => {
  if (e.key==='Escape'){ openId=null; renderPanel(); $('#cmdkMask').classList.remove('open'); $('#archive').classList.remove('open'); $('#emptyState').classList.remove('open'); return; }
  if ((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='k'){ e.preventDefault(); openCmdk(); return; }
  if (e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
  const cards=[...document.querySelectorAll('.card')];
  if (e.key==='j'||e.key==='J'){ focusIdx=Math.min(focusIdx+1,cards.length-1); renderBoard(); cards[focusIdx]?.scrollIntoView({block:'nearest'}); }
  if (e.key==='k'||e.key==='K'){ focusIdx=Math.max(focusIdx-1,0); renderBoard(); }
  if (e.key==='Enter'){ const c=document.querySelector(`.card[data-idx="${focusIdx}"]`); if(c){ openId=c.dataset.open; curTab='doc'; renderPanel(); } }
  if (e.key==='a'||e.key==='A'){
    const target = openId && tasks.find(t=>t.id===openId)?.approval ? openId : attention().find(i=>i.t.approval)?.t.id;
    if (target) approve(target);
  }
});

/* 命令面板 */
const CMDS = [
  { ic:'↓', lb:'从 TW 领取任务', k:'', run:()=>{ toast('TW MCP 拉取任务…'); } },
  { ic:'＋', lb:'新建本地任务', k:'', run:()=>toast('新建任务 Dialog') },
  { ic:'▣', lb:'查看归档', k:'', run:()=>{ renderArchive(); $('#archive').classList.add('open'); } },
  { ic:'◐', lb:'切换主题', k:'', run:()=>$('#themeToggle').click() },
  { ic:'◌', lb:'预览空状态', k:'', run:()=>$('#emptyState').classList.add('open') },
];
function openCmdk(){
  $('#cmdkMask').classList.add('open'); const inp=$('#cmdkInput'); inp.value=''; inp.focus(); renderCmdk('');
}
function renderCmdk(q){
  const taskItems = tasks.filter(t=>!['completed','cancelled'].includes(t.phase) && (t.title.includes(q)||t.cb.toLowerCase().includes(q.toLowerCase())))
    .map(t=>({ ic:'→', lb:`${t.cb} · ${t.title}`, k:PHASE_LABEL[t.phase], run:()=>{ openId=t.id; curTab='doc'; renderPanel(); } }));
  const cmdItems = CMDS.filter(c=>c.lb.includes(q));
  const items = q ? [...taskItems, ...cmdItems] : [...cmdItems, ...taskItems];
  $('#cmdkList').innerHTML = items.map((i,ix)=>`<div class="item ${ix===0?'sel':''}" data-ci="${ix}"><span class="ic">${i.ic}</span>${i.lb}${i.k?`<kbd>${i.k}</kbd>`:''}</div>`).join('');
  window._cmdItems = items;
}
$('#cmdkInput').addEventListener('input', e=>renderCmdk(e.target.value));
$('#cmdkInput').addEventListener('keydown', e=>{ if(e.key==='Enter'){ window._cmdItems?.[0]?.run(); $('#cmdkMask').classList.remove('open'); }});
$('#cmdkList').addEventListener('click', e=>{ const it=e.target.closest('[data-ci]'); if(it){ window._cmdItems[+it.dataset.ci].run(); $('#cmdkMask').classList.remove('open'); }});
$('#cmdkMask').addEventListener('click', e=>{ if(e.target.id==='cmdkMask') $('#cmdkMask').classList.remove('open'); });

/* ================= 闭环演示 ================= */
$('#btnReset').onclick = () => { clearTimeout(demoTimer); tasks = seed(); openId=null; focusIdx=0; renderAll(); renderPanel(); toast('已重置演示数据'); };
$('#btnDemo').onclick = () => {
  clearTimeout(demoTimer);
  // 新任务从 TW 进入，全自动走到审核 gate，人批准后继续
  const nt = { id:'demo', cb:'CB-028', tw:'TW-1042', title:'演示：预览防抖丢帧率优化', type:'requirement', prio:'P2', ws:'camera',
    phase:'pending', assignee:'李', dwell:'刚刚', origin:'tw', retries:0, aiActive:false,
    desc:'EIS 开启时 60fps 预览偶现丢帧，丢帧率 1.2%。目标 <0.3%。（本任务为闭环演示，自动推进，审核 gate 处等待你点击批准）',
    artifacts:[ {n:'requirements.md', done:false}, {n:'design.md', done:false}, {n:'experience.md', done:false} ] };
  tasks = tasks.filter(t=>t.id!=='demo'); tasks.unshift(nt);
  openId='demo'; renderAll();
  toast('① TW 领取：任务已落本地状态库（checkpoint 写入）');
  const seq = [
    [1200, ()=>{ transition('demo','req-writing','② Spec 节点：AI 按 work-sdd 模板生成需求文档'); }],
    [3400, ()=>{ const t=tasks.find(x=>x.id==='demo'); t.artifacts[0].done=true; transition('demo','req-reviewing','③ 审核 gate：图 interrupt 挂起，等待你批准（按 A）'); }],
  ];
  let acc=0; seq.forEach(([d,f])=>{ acc+=d; demoTimer=setTimeout(f,acc); });
  // 监听后续：批准 req → design 自动，design 批准 → coding → 完成
  const watcher = setInterval(()=>{
    const t = tasks.find(x=>x.id==='demo'); if(!t){ clearInterval(watcher); return; }
    if (t.phase==='design-writing' && !t._d1){ t._d1=true;
      setTimeout(()=>{ t.artifacts[1].done=true; transition('demo','design-reviewing','④ 方案生成完毕，再次进入审核 gate（按 A 批准）'); }, 2600); }
    if (t.phase==='coding' && !t._d2){ t._d2=true; curTab='log'; renderPanel();
      toast('⑤ THO 下发：origin:work 会话已拉起（右侧执行日志实时流）');
      setTimeout(()=>{ transition('demo','gerrit-reviewing','⑥ 编码完成：THO 回传（telemetry 必填段已采集）'); }, 5200); }
    if (t.phase==='gerrit-reviewing' && !t._d3){ t._d3=true;
      setTimeout(()=>transition('demo','pending-writeup','⑦ CR 合入，进入回写'), 2200); }
    if (t.phase==='pending-writeup' && !t._d4){ t._d4=true;
      setTimeout(()=>{ const x=tasks.find(y=>y.id==='demo'); x.artifacts[2].done=true; x.fin='今天';
        transition('demo','completed','⑧ 闭环完成：状态与摘要已回写 TW，任务入归档 ✓'); openId=null; renderPanel(); }, 2400); }
  }, 300);
};

renderAll();
</script>
