# GitHub Actions: 自动打包分发
#
# 触发条件：推送 v* tag（如 v0.4.0）
# 构建 macOS 和 Windows 产物并发布到 GitHub Releases
#
# 所需 GitHub Secrets（macOS 签名/公证 — 应用内自动更新强依赖签名）:
# - MAC_CERTS: Base64 编码的 macOS Developer ID Application 证书 (.p12)
# - MAC_CERTS_PASSWORD: 证书密码
# - APPLE_ID: Apple ID（公证用）
# - APPLE_APP_SPECIFIC_PASSWORD: App-Specific 密码（公证用）
# - APPLE_TEAM_ID: Apple Developer Team ID
#
# 注意：若未配置 MAC_CERTS，CI 会产出未签名包。Squirrel.Mac 无法对未签名应用
# 执行 quitAndInstall，客户端会降级为「检查更新 → 前往 GitHub Releases 手动下载」。
# GITHUB_TOKEN 由 GitHub Actions 自动提供，无需手动配置

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate-release-version:
    name: validate release version
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 校验 tag 与应用版本一致
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "发布 tag 必须是 vX.Y.Z 格式，实际为：$tag" >&2
            exit 1
          fi

          app_version="$(node -p "require('./apps/electron/package.json').version")"
          if [[ "${tag#v}" != "$app_version" ]]; then
            echo "发布 tag 与 apps/electron/package.json 版本不一致：tag=$tag，app=$app_version" >&2
            exit 1
          fi

          echo "发布版本校验通过：$tag"

  build-mac-arm64:
    name: build (macos-latest, mac, arm64, --arm64)
    runs-on: macos-latest
    needs: validate-release-version
    env:
      MAC_CERTS: ${{ secrets.MAC_CERTS }}
      MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: bun install --frozen-lockfile

      # 有签名证书时导入；无证书（内部构建）时跳过，产出未签名包
      - name: 导入 macOS 签名证书
        if: env.MAC_CERTS != ''
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$MAC_CERTS" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$MAC_CERTS_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm $RUNNER_TEMP/cert.p12

      - name: 构建 Electron 应用
        run: bun run electron:build
        working-directory: .

      - name: 打包并发布 (macOS arm64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ env.MAC_CERTS != '' }}
        run: |
          for i in 1 2 3; do
            npx electron-builder --mac --arm64 --publish always && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
        working-directory: apps/electron

  build-windows-x64:
    name: build (windows-latest, win, x64, --x64)
    runs-on: windows-latest
    needs: validate-release-version

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: bun install --frozen-lockfile

      # 构建应用
      - name: 构建 Electron 应用
        run: bun run electron:build
        working-directory: .

      - name: 打包并发布 (Windows)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --publish always
        working-directory: apps/electron
